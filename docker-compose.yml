services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: quackhack2026:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_DIALECT: sqlite
    networks:
      default:
        aliases:
          - neigh-ver-go-broke
  
networks:
  default:
    name: zoraxy_proxy
    external: true
